repos:
  - repo: local
    hooks:
      - id: rust-fmt
        name: rust fmt
        entry: bash -c 'cd rust && cargo fmt --check'
        language: system
        pass_filenames: false
        always_run: true

      - id: rust-clippy
        name: rust clippy
        entry: bash -c 'cd rust && cargo clippy --workspace --all'
        language: system
        pass_filenames: false
        always_run: true

      - id: oxlint
        name: oxlint
        entry: bash -c 'cd web && pnpm run lint'
        language: system
        files: \.[jt]s$
        pass_filenames: false

      - id: oxfmt
        name: oxfmt
        entry: bash -c 'cd web && pnpm run fmt:check'
        language: system
        files: \.[jt]s$
        pass_filenames: false

      - id: validate-data
        name: validate data
        entry: bash -c 'cd web && pnpm run validate:data'
        language: system
        pass_filenames: false
        always_run: true

      - id: typecheck
        name: typecheck
        entry: bash -c 'cd web && pnpm run build'
        language: system
        files: \.[jt]s$
        pass_filenames: false
